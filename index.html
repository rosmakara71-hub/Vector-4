<body>

<div class="quiz-container">
    <h1>рҹ“қ бһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһҸбҹҒбһҹбҹ’бһҸбҹ– бһ’бһҡбһҺбһёбһҳбһ¶бһҸбҹ’бһҡбһҖбҹ’бһ“бһ»бһ„бһӣбҹҶбһ  бһҹбһ»бһ‘бҹ’бһ’бһҹбһ¶бһ’ (бҹўбҹҘ бһҹбҹҶбһҺбһҪбһҡбһҗбҹ’бһҳбһё)</h1>
    
    <div class="student-info">
        <div>

        </div>
        <div>
            <label for="sClass">бһҗбҹ’бһ“бһ¶бһҖбҹӢбһҡбҹҖбһ“бҹ–</label>

        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">бһ”бһүбҹ’бһҮбһјбһ“бһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶ бһ“бһ·бһ„бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһӣбһ‘бҹ’бһ’бһ•бһӣ</button>
    <div id="summary"></div>
</div>

<script>
    // бһҹбҹҶбһҺбһҪбһҡбһҗбҹ’бһҳбһёбһ‘бһ¶бҹҶбһ„ бҹўбҹҘ бһўбҹҶбһ–бһёбһ’бһҡбһҺбһёбһҳбһ¶бһҸбҹ’бһҡбһҖбҹ’бһ“бһ»бһ„бһӣбҹҶбһ  (бһңбһӮбҹ’бһӮбҹў)
    const questions = [
        { q: "бһҡбһҖбһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒбһ“бҹғбһңбҹүбһ·бһ…бһ‘бҹҗбһҡ $2\\vec{u} - \\vec{v}$ бһ”бһҫ $\\vec{u}=(1, -1, 2)$ бһ“бһ·бһ„ $\\vec{v}=(3, 0, 1)$?", opt: ["$(-1, -2, 3)$", "$(5, -2, 5)$", "$(-1, -2, 5)$", "$(1, -2, 3)$"], ans: "$(-1, -2, 3)$", exp: "$2\\vec{u} - \\vec{v} = (2(1)-3, 2(-1)-0, 2(2)-1) = (2-3, -2, 4-1) = (-1, -2, 3)$" },
        { q: "бһҸбһҫбһ”бҹ’бһӣбһ„бҹӢбһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒ $(Oyz)$ бһҳбһ¶бһ“бһҹбһҳбһёбһҖбһ¶бһҡбһҠбһјбһ…бһҳбҹ’бһҸбҹҒбһ…?", opt: ["$x = 0$", "$y = 0$", "$z = 0$", "$y + z = 0$"], ans: "$x = 0$", exp: "бһ“бҹ…бһӣбһҫбһ”бҹ’бһӣбһ„бҹӢ $(Oyz)$ бһӮбҹ’бһҡбһ”бҹӢбһ…бҹҶбһҺбһ»бһ…бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҳбһ¶бһ“бһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒбһҸбһ¶бһҳбһўбҹҗбһҖбҹ’бһҹ $x$ бһҹбҹ’бһҳбһҫбһ“бһ№бһ„ $0$ бһҮбһ¶бһ“бһ·бһ…бҹ’бһ…бҹ”" },
        { q: "бһҡбһҖбһҹбһҳбһёбһҖбһ¶бһҡбһ”бҹ’бһӣбһ„бҹӢбһҠбҹӮбһӣбһҖбһ¶бһҸбҹӢбһҸбһ¶бһҳбһ…бҹҶбһҺбһ»бһ… $A(1, 2, 3)$ бһ бһҫбһҷбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһ”бҹ’бһӣбһ„бҹӢ $(Oxy)$?", opt: ["$z = 3$", "$x = 1$", "$y = 2$", "$x + y + z = 6$"], ans: "$z = 3$", exp: "бһ”бҹ’бһӣбһ„бҹӢбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһ”бҹ’бһӣбһ„бҹӢ $(Oxy)$ бһҳбһ¶бһ“бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҺбһҡбһҳбҹүбһ¶бһӣбҹӢ $\\vec{n}=(0,0,1)$ бһҠбһјбһ…бһ“бҹҒбҹҮбһҹбһҳбһёбһҖбһ¶бһҡбһӮбһә $0(x-1)+0(y-2)+1(z-3)=0 \\Rightarrow z=3$бҹ”" },
        { q: "бһҡбһҖбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢбһ‘бһ·бһҹбһ“бҹғбһ”бһ“бҹ’бһ‘бһ¶бһҸбҹӢбһҠбҹӮбһӣбһҖбһ¶бһҸбҹӢбһҸбһ¶бһҳбһ–бһёбһҡбһ…бҹҶбһҺбһ»бһ… $A(1, 1, 1)$ бһ“бһ·бһ„ $B(2, 3, 5)$?", opt: ["$\\vec{u}=(1, 2, 4)$", "$\\vec{u}=(3, 4, 6)$", "$\\vec{u}=(-1, -2, -4)$", "$\\vec{u}=(1, 3, 5)$"], ans: "$\\vec{u}=(1, 2, 4)$", exp: "бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢбһ‘бһ·бһҹбһўбһ¶бһ…бһҷбһҖбһҮбһ¶бһңбҹүбһ·бһ…бһ‘бҹҗбһҡ $\\vec{AB} = (2-1, 3-1, 5-1) = (1, 2, 4)$бҹ”" },
        { q: "бһӮбһҺбһ“бһ¶бһ…бһҳбҹ’бһ„бһ¶бһҷбһ–бһёбһ…бҹҶбһҺбһ»бһ… $P(1, 2, 3)$ бһ‘бҹ…бһӮбһӣбҹӢбһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒ $O(0,0,0)$?", opt: ["$\\sqrt{14}$", "$6$", "$\\sqrt{6}$", "$14$"], ans: "$\\sqrt{14}$", exp: "$OP = \\sqrt{1^2 + 2^2 + 3^2} = \\sqrt{1 + 4 + 9} = \\sqrt{14}$" },
        { q: "бһҡбһҖбһҸбһҳбҹ’бһӣбҹғ $m$ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһңбҹүбһ·бһ…бһ‘бҹҗбһҡ $\\vec{u}=(2, m, 1)$ бһ“бһ·бһ„ $\\vec{v}=(m, -3, 2)$ бһҖбҹӮбһ„бһӮбҹ’бһ“бһ¶?", opt: ["$2$", "$-2$", "$1$", "$0$"], ans: "$2$", exp: "$\\vec{u} \\perp \\vec{v} \\Rightarrow \\vec{u} \\cdot \\vec{v} = 0 \\Rightarrow 2(m) + m(-3) + 1(2) = 0 \\Rightarrow -m + 2 = 0 \\Rightarrow m = 2$бҹ”" },
        { q: "бһҸбһҫбһ”бһ“бҹ’бһ‘бһ¶бһҸбҹӢбһ–бһёбһҡбһҠбҹӮбһӣбһҳбһ¶бһ“бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢбһ‘бһ·бһҹ $\\vec{u}_1=(1, 2, -1)$ бһ“бһ·бһ„ $\\vec{u}_2=(-2, -4, 2)$ бһҳбһ¶бһ“бһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһӮбҹ’бһ“бһ¶бһҷбҹүбһ¶бһ„бһҺбһ¶?", opt: ["бһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶ бһ¬бһҮбһ¶бһ“бҹӢбһӮбҹ’бһ“бһ¶", "бһҖбҹӮбһ„бһӮбҹ’бһ“бһ¶", "бһҖбһ¶бһҸбҹӢбһӮбҹ’бһ“бһ¶бһ”бһ„бҹ’бһҖбһҫбһҸбһҳбһ»бҹҶ $90^\\circ$", "бһҒбҹ’бһңбҹӮбһ„бһӮбҹ’бһ“бһ¶"], ans: "бһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶ бһ¬бһҮбһ¶бһ“бҹӢбһӮбҹ’бһ“бһ¶", exp: "бһҠбҹ„бһҷбһҹбһ¶бһҡ $\\vec{u}_2 = -2\\vec{u}_1$ бһ“бһ¶бҹҶбһұбҹ’бһҷбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢбһ‘бһ·бһҹбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶ бһҠбһјбһ…бһ“бҹҒбҹҮбһ”бһ“бҹ’бһ‘бһ¶бһҸбҹӢбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶ бһ¬бһҮбһ¶бһ“бҹӢбһӮбҹ’бһ“бһ¶бҹ”" },
        { q: "бһҡбһҖбһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒбһ•бҹ’бһ…бһ·бһҸ $I$ бһ“бҹғбһҠбҹӮбһ“бһҹбҹҠбҹ’бһңбҹӮбһҡ $(S): x^2 + y^2 + z^2 - 2x + 4y - 6z = 0$?", opt: ["$I(1, -2, 3)$", "$I(-1, 2, -3)$", "$I(2, -4, 6)$", "$I(1, 2, 3)$"], ans: "$I(1, -2, 3)$", exp: "бһ•бҹ’бһ…бһ·бһҸ $I\\left(-\\frac{a}{2}, -\\frac{b}{2}, -\\frac{c}{2}\\right) = I\\left(-\\frac{-2}{2}, -\\frac{4}{2}, -\\frac{-6}{2}\\right) = I(1, -2, 3)$бҹ”" },
        { q: "бһӮбһҺбһ“бһ¶бһҖбһ¶бҹҶ $R$ бһ“бҹғбһҠбҹӮбһ“бһҹбҹҠбҹ’бһңбҹӮбһҡ $(S): x^2 + y^2 + z^2 - 4z - 5 = 0$?", opt: ["$3$", "$9$", "$5$", "$\\sqrt{5}$"], ans: "$3$", exp: "бһҹбһҳбһёбһҖбһ¶бһҡбһҹбһҡбһҹбҹҒбһҡбһЎбһҫбһ„бһңбһ·бһүбҹ– $x^2 + y^2 + (z-2)^2 - 4 - 5 = 0 \\Rightarrow x^2 + y^2 + (z-2)^2 = 9 \\Rightarrow R = \\sqrt{9} = 3$бҹ”" },
        { q: "бһ”бһҫбһҠбһ№бһ„бһҗбһ¶ $\\vec{u} \\times \\vec{v} = \\vec{0}$ бһҸбһҫбһӮбҹҒбһўбһ¶бһ…бһҹбһ“бҹ’бһ“бһ·бһҠбҹ’бһӢбһ¶бһ“бһ”бһ¶бһ“бһҠбһјбһ…бһҳбҹ’бһҸбҹҒбһ…бһ…бҹҶбһ–бҹ„бҹҮбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡ (бһҳбһ·бһ“бһҹбһјбһ“бҹ’бһҷ)?", opt: ["$\\vec{u}$ бһҹбҹ’бһҡбһ”бһ“бһ№бһ„ $\\vec{v}$", "$\\vec{u}$ бһҖбҹӮбһ„бһ“бһ№бһ„ $\\vec{v}$", "$\\vec{u}$ бһҹбҹ’бһҳбһҫбһ“бһ№бһ„ $\\vec{v}$", "бһӮбҹ’бһҳбһ¶бһ“бһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһ‘бҹҒ"], ans: "$\\vec{u}$ бһҹбҹ’бһҡбһ”бһ“бһ№бһ„ $\\vec{v}$", exp: "бһ•бһӣбһӮбһ»бһҺбһҒбҹ’бһңбҹӮбһ„бһҹбҹ’бһҳбһҫбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҹбһјбһ“бҹ’бһҷ бһӣбһ»бҹҮбһҸбҹ’бһҡбһ¶бһҸбҹӮбһҳбһ»бҹҶбһҡбһңбһ¶бһ„бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһҹбҹ’бһҳбһҫ $0^\\circ$ бһ¬ $180^\\circ$ (бһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶)бҹ”" },

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // бҹЎ. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһ бһ¶бһҸбҹӢ
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // бҹў. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһҮбһҳбҹ’бһҡбһҫбһҹбһ…бһҳбҹ’бһӣбһҫбһҷбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбҹҶбһҺбһҪбһҡбһ“бһёбһҳбһҪбһҷбҹ—
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">бһҹбҹҶбһҺбһҪбһҡбһ‘бһё ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҖбҹӮбһ–бһ·бһ“бҹ’бһ‘бһ» бһ“бһ·бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("бһҹбһјбһҳбһ”бҹҶбһ–бҹҒбһүбһҲбҹ’бһҳбҹ„бҹҮ бһ“бһ·бһ„бһҗбҹ’бһ“бһ¶бһҖбҹӢбһҡбҹҖбһ“бһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "вң… <b>бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң!</b> бһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбҹ– " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "вқҢ <b>бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһ‘бҹҒ!</b> бһ…бһҳбҹ’бһӣбһҫбһҷбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбһәбҹ– " + item.ans + "<br>рҹ’Ў <b>бһҖбһ¶бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢбҹ–</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `рҹҺ“ бһ”бҹҒбһҖбҹ’бһҒбһҮбһ“бҹ– ${name} | бһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${sClass} <br> рҹ“Ҡ бһӣбһ‘бҹ’бһ’бһ•бһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бҹ– ${score} / ${shuffledQuestions.length} бһҹбҹҶбһҺбһҪбһҡ (бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${Math.round((score/25)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
